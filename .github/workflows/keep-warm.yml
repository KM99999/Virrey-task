# Mantiene "despierto" el servicio de Render (plan free) para eliminar la pantalla
# de arranque ("Welcome to Render") del cold-start. Hace ping a /api/health cada
# ~10 minutos (Render duerme tras ~15 min de inactividad). GRATIS en repos públicos
# y NO consume saldo de Gemini (health no llama a la IA).
name: keep-warm

on:
  schedule:
    - cron: "*/5 * * * *"    # cada 5 min (mínimo que permite GitHub). OJO: GitHub RETRASA y a veces
                             # OMITE las tareas programadas cuando hay carga, así que el servicio
                             # puede dormirse igualmente. Para eliminar el arranque en frío por
                             # completo hace falta un plan de Render de pago (decisión del cliente),
                             # o un pinger externo (p. ej. UptimeRobot / cron-job.org).
  workflow_dispatch: {}       # permite ejecutarlo a mano desde la pestaña Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -fsS --max-time 60 https://math-ia.onrender.com/api/health || true
